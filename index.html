<!DOCTYPE html> 
<html> 
<head> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>InGrediBite</title> 
  <style> 
    @import url('https://cdnfonts.com'); 
    body { 
      background: linear-gradient(180deg, #f8f7f2 10%, #f8f7f2 35%, #6b8659 73%, #6b8659 100%); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      text-align: center; 
      padding: 20px; 
      box-sizing: border-box; 
    } 
    .logo { 
      width: 100%; 
      max-width: 400px; 
      height: auto; 
      margin-top: 20px; 
    } 
    h1 { 
      font-size: 2rem; 
      margin-top: 10px; 
    } 
    button { 
      padding: 10px 20px; 
      font-size: 1rem; 
      margin: 5px; 
      cursor: pointer; 
    } 
    .signup-btn { 
      background-color: #32a852; 
      color: white; 
      font-family: 'Lucida Calligraphy', cursive; 
      border: none; 
      border-radius: 8px; 
    } 
    /* === MODAL STYLES === */ 
    .modal-overlay { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background-color: rgba(0, 0, 0, 0.5); 
      justify-content: center; 
      align-items: center; 
      z-index: 1000; 
    } 
    .modal-box { 
      background-color: white; 
      padding: 30px; 
      border-radius: 15px; 
      width: 90%; 
      max-width: 350px; 
      box-shadow: 0px 4px 15px rgba(0,0,0,0.2); 
      position: relative; 
      text-align: center; 
    } 
    .modal-box h2 { 
      margin-top: 10px; 
      font-family: Arial, sans-serif; 
      color: #333; 
    } 
    .options-list { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      margin-top: 20px; 
    } 
    .provider-btn { 
      padding: 12px; 
      font-size: 1rem; 
      border: 1px solid #ddd; 
      border-radius: 8px; 
      background-color: white; 
      font-weight: bold; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: background-color 0.2s; 
    } 
    .provider-btn:hover { 
      background-color: #f5f5f5; 
    } 
    .google-btn { color: #4285F4; border-color: #4285F4; } 
    .yahoo-btn { color: #6001d2; border-color: #6001d2; } 
    .email-btn { 
      background-color: #32a852; 
      color: white; 
      border: none; 
    } 
    .email-btn:hover { background-color: #288441; } 
    .close-btn { 
      position: absolute; 
      top: 10px; right: 15px; 
      font-size: 1.5rem; 
      background: none; 
      border: none; 
      color: #aaa; 
      padding: 0; margin: 0; 
    } 
    .close-btn:hover { color: #333; } 
    /* === FORM INPUT STYLES === */ 
    .email-form { 
      display: none; 
      flex-direction: column; 
      gap: 15px; 
      margin-top: 20px; 
      text-align: left; 
    } 
    .email-form label { 
      font-family: Arial, sans-serif; 
      font-size: 0.85rem; 
      color: #555; 
      font-weight: bold; 
      margin-bottom: -5px; 
    } 
    .email-form input { 
      padding: 12px; 
      font-size: 1rem; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      box-sizing: border-box; 
      width: 100%; 
    } 
    .submit-btn { 
      background-color: #32a852; 
      color: white; 
      border: none; 
      padding: 12px; 
      font-size: 1rem; 
      border-radius: 8px; 
      font-weight: bold; 
      margin-top: 10px; 
    } 
    .submit-btn:hover { background-color: #288441; } 
    .back-btn { 
      position: absolute; 
      top: 12px; left: 15px; 
      font-size: 0.9rem; 
      background: none; 
      border: none; 
      color: #32a852; 
      font-weight: bold; 
      padding: 0; margin: 0; 
      display: none; 
    } 
    @media (min-width: 768px) { 
      .logo { max-width: 860px; margin-top: 85px; } 
      h1 { font-size: 3.5rem; } 
    } 
  </style> 
</head> 
<body> 
  <img src="images/ingredibiteLogo.png" alt="Ingredibite Logo" class="logo"> 
  <h1 style="font-family: 'Saint George', Georgia, serif;">Our Mission:</h1> 
  <p style="font-family: 'Saint George', Georgia, serif; font-style: italic;">Welcome to DineSafe!</p> 
  <div> 
    <button type="button" id="loginBtn">Log in</button> 
    <button type="button" class="signup-btn" id="signupBtn">Sign up</button> 
  </div> 
  <!-- === MODAL HTML === --> 
  <div class="modal-overlay" id="signupModal"> 
    <div class="modal-box"> 
      <button class="back-btn" id="backBtn">&larr; Back</button> 
      <button class="close-btn" id="closeModal">&times;</button> 
      <h2 id="modalTitle">Create an Account</h2> 
      <p id="modalSub" style="color: #666; font-size: 0.9rem;">Choose how you want to sign up:</p> 
      <!-- SCREEN 1: Social Buttons --> 
      <div class="options-list" id="socialOptions"> 
        <button type="button" class="provider-btn google-btn" id="googleBtn">Continue with Google</button> 
        <button type="button" class="provider-btn yahoo-btn" id="yahooBtn">Continue with Yahoo</button> 
        <button type="button" class="provider-btn email-btn" id="emailBtn">Sign up with Email</button> 
      </div> 
      <!-- SCREEN 2: Email Form --> 
      <form class="email-form" id="emailForm"> 
        <label for="userEmail">Email Address</label> 
        <input type="email" id="userEmail" placeholder="name@example.com" required> 
        <label for="userPassword">Password</label> 
        <input type="password" id="userPassword" placeholder="Enter your password" required> 
        <button type="submit" class="submit-btn" id="submitBtn">Create Account</button> 
      </form> 
    </div> 
  </div> 
  
  <script> 
    const loginButton = document.getElementById('loginBtn');
    const signupButton = document.getElementById('signupBtn'); 
    const signupModal = document.getElementById('signupModal'); 
    const closeModal = document.getElementById('closeModal'); 
    const backButton = document.getElementById('backBtn'); 
    const socialOptions = document.getElementById('socialOptions'); 
    const emailForm = document.getElementById('emailForm'); 
    const modalTitle = document.getElementById('modalTitle'); 
    const modalSub = document.getElementById('modalSub'); 
    const emailBtn = document.getElementById('emailBtn');
    const submitBtn = document.getElementById('submitBtn');

    let isLoginMode = false;

    signupButton.addEventListener('click', function() { 
      isLoginMode = false;
      signupModal.style.display = 'flex'; 
      resetModal(); 
    }); 

    loginButton.addEventListener('click', function() {
      isLoginMode = true;
      signupModal.style.display = 'flex';
      resetModal();
    });

    closeModal.addEventListener('click', function() { 
      signupModal.style.display = 'none'; 
    }); 

    window.addEventListener('click', function(event) { 
      if (event.target === signupModal) { 
        signupModal.style.display = 'none'; 
      } 
    }); 

    emailBtn.addEventListener('click', function() { 
      socialOptions.style.display = 'none'; 
      emailForm.style.display = 'flex'; 
      backButton.style.display = 'block'; 
      if (isLoginMode) {
        modalTitle.innerText = "Log in with Email"; 
        modalSub.innerText = "Enter your account details:"; 
        submitBtn.innerText = "Log In";
      } else {
        modalTitle.innerText = "Sign up with Email"; 
        modalSub.innerText = "Enter your details below:"; 
        submitBtn.innerText = "Create Account";
      }
    }); 

    backButton.addEventListener('click', resetModal); 

    function resetModal() { 
      socialOptions.style.display = 'flex'; 
      emailForm.style.display = 'none'; 
      backButton.style.display = 'none'; 
      if (isLoginMode) {
        modalTitle.innerText = "Welcome Back"; 
        modalSub.innerText = "Choose how you want to log in:"; 
        emailBtn.innerText = "Log in with Email";
      } else {
        modalTitle.innerText = "Create an Account"; 
        modalSub.innerText = "Choose how you want to sign up:"; 
        emailBtn.innerText = "Sign up with Email";
      }
    } 

    // REAL USER MANAGEMENT RETRIEVAL ENGINE BLOCK
    emailForm.addEventListener('submit', function(event) { 
      event.preventDefault(); 
      const email = document.getElementById('userEmail').value; 
      const password = document.getElementById('userPassword').value; 

      if (isLoginMode) {
        // --- REAL LOGIN CHECK ---
        const savedPassword = localStorage.getItem("user_pwd_" + email);
        if (savedPassword && savedPassword === password) {
          localStorage.setItem("current_logged_in_user", email);
          window.location.href = "dashboard.html"; 
        } else {
          alert("Incorrect email or password combination!");
        }
      } else {
        // --- REAL SIGNUP REGISTRATION ---
        if (localStorage.getItem("user_pwd_" + email)) {
          alert("An account with this email already exists!");
        } else {
          localStorage.setItem("user_pwd_" + email, password); // Saves account safely!
          localStorage.setItem("current_logged_in_user", email); // Logs them in
          window.location.href = "dashboard.html"; 
        }
      }
    }); 

    // Social buttons auto-simulate user generation tags
    document.getElementById('googleBtn').addEventListener('click', function() { 
      localStorage.setItem("current_logged_in_user", "Google_User");
      window.location.href = "dashboard.html"; 
    }); 

    document.getElementById('yahooBtn').addEventListener('click', function() { 
      localStorage.setItem("current_logged_in_user", "Yahoo_User");
      window.location.href = "dashboard.html"; 
    }); 
  </script> 
</body> 
</html>
